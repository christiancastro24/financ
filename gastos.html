<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinControl - Gastos</title>
    <style>
      /* ============================================
                   CSS VARIÁVEIS - TEMA MODERNO
                   ============================================ */
      :root {
        --bg-primary: #0f0f1a;
        --bg-secondary: #1a1a2e;
        --bg-card: rgba(26, 26, 46, 0.8);
        --bg-card-hover: rgba(40, 40, 70, 0.9);
        --bg-input: #16162b;
        --border-color: rgba(255, 255, 255, 0.06);
        --border-light: rgba(255, 255, 255, 0.1);

        --text-primary: #ffffff;
        --text-secondary: rgba(255, 255, 255, 0.7);
        --text-muted: rgba(255, 255, 255, 0.4);

        --accent-blue: #6c63ff;
        --accent-purple: #a855f7;
        --accent-green: #34d399;
        --accent-amber: #fbbf24;
        --accent-red: #f87171;
        --accent-pink: #ec4899;
        --accent-cyan: #22d3ee;
        --accent-orange: #fb923c;
        --accent-rose: #f43f5e;

        --gradient-primary: linear-gradient(135deg, #6c63ff, #a855f7);
        --gradient-card: linear-gradient(
          145deg,
          rgba(26, 26, 46, 0.9),
          rgba(15, 15, 26, 0.9)
        );
        --gradient-success: linear-gradient(135deg, #34d399, #059669);

        --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.7);

        --radius: 20px;
        --radius-sm: 12px;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ============================================
                   RESET E BASE
                   ============================================ */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        display: flex;
        min-height: 100vh;
        overflow-x: hidden;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-secondary);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--accent-blue);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-purple);
      }

      /* ============================================
                   HEADER SUPERIOR
                   ============================================ */
      .top-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 70px;
        background: rgba(15, 15, 26, 0.9);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 40px 0 20px;
        z-index: 99;
        margin-left: 80px;
      }

      .top-header .header-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .top-header .header-left h1 {
        font-size: 20px;
        font-weight: 700;
        background: var(--gradient-primary);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .top-header .header-left .date-display {
        font-size: 14px;
        color: var(--text-secondary);
        font-weight: 400;
        -webkit-text-fill-color: var(--text-secondary);
      }

      .top-header .header-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .top-header .header-right .nav-links {
        display: flex;
        gap: 8px;
      }

      .top-header .header-right .nav-links a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 13px;
        padding: 6px 14px;
        border-radius: var(--radius-sm);
        transition: var(--transition);
        border: 1px solid transparent;
      }

      .top-header .header-right .nav-links a:hover {
        color: var(--text-secondary);
        background: rgba(255, 255, 255, 0.05);
      }

      .top-header .header-right .nav-links a.active {
        color: var(--accent-blue);
        background: rgba(108, 99, 255, 0.12);
        border-color: rgba(108, 99, 255, 0.2);
      }

      /* SELETOR DE PERFIL */
      .profile-selector {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        padding: 4px 8px;
        cursor: pointer;
      }

      .profile-selector .profile-avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 600;
        flex-shrink: 0;
        transition: var(--transition);
        cursor: pointer;
      }

      .profile-selector .profile-avatar:hover {
        transform: scale(1.1);
      }

      .profile-selector .profile-avatar.personal {
        background: var(--accent-blue);
        color: white;
      }

      .profile-selector .profile-avatar.aunt {
        background: var(--accent-pink);
        color: white;
      }

      .profile-selector .profile-avatar.guest {
        background: var(--accent-green);
        color: white;
      }

      .profile-selector select {
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-size: 13px;
        padding: 4px 8px;
        outline: none;
        cursor: pointer;
        font-weight: 500;
        min-width: 80px;
      }

      .profile-selector select option {
        background: var(--bg-secondary);
        color: var(--text-primary);
      }

      .profile-selector .profile-salary {
        font-size: 11px;
        color: var(--text-muted);
        padding: 0 8px;
        border-left: 1px solid var(--border-color);
      }

      .top-header .header-right .theme-toggle {
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        border-radius: 50%;
        width: 40px;
        height: 40px;
        color: var(--text-secondary);
        cursor: pointer;
        transition: var(--transition);
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .top-header .header-right .theme-toggle:hover {
        background: var(--bg-card-hover);
        color: var(--text-primary);
        transform: rotate(30deg);
      }

      .top-header .header-right .user-badge {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 50px;
        padding: 6px 16px 6px 6px;
      }

      .top-header .header-right .user-badge .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--gradient-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 600;
      }

      .top-header .header-right .user-badge span {
        font-size: 13px;
        color: var(--text-secondary);
      }

      /* ============================================
                   ASIDE - MENU LATERAL
                   ============================================ */
      aside {
        width: 80px;
        background: rgba(15, 15, 26, 0.95);
        backdrop-filter: blur(20px);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 0;
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        z-index: 100;
        transition: var(--transition);
      }

      .logo {
        font-size: 28px;
        margin-bottom: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        background: var(--gradient-primary);
        border-radius: 16px;
        color: white;
        transition: var(--transition);
        text-decoration: none;
      }

      .logo:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(108, 99, 255, 0.3);
      }

      .nav-item {
        width: 56px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        text-decoration: none;
        cursor: pointer;
        border: none;
        background: transparent;
        border-radius: 16px;
        transition: var(--transition);
        position: relative;
        margin-bottom: 8px;
      }

      .nav-item svg {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
        stroke: currentColor;
        transition: var(--transition);
      }

      .nav-item:hover {
        color: var(--text-secondary);
        background: rgba(255, 255, 255, 0.05);
      }

      .nav-item.active {
        color: var(--accent-blue);
        background: rgba(108, 99, 255, 0.12);
        box-shadow: 0 0 20px rgba(108, 99, 255, 0.1);
      }

      .nav-divider {
        width: 40px;
        height: 1px;
        background: var(--border-color);
        margin: 8px 0;
      }

      /* ============================================
                   MAIN - CONTEÚDO PRINCIPAL
                   ============================================ */
      main {
        margin-left: 80px;
        margin-top: 70px;
        flex: 1;
        padding: 32px 40px;
        min-height: calc(100vh - 70px);
        transition: var(--transition);
      }

      /* ============================================
                   CARDS
                   ============================================ */
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 32px;
      }

      .card {
        background: var(--gradient-card);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        padding: 24px;
        transition: var(--transition);
        box-shadow: var(--shadow-card);
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--gradient-primary);
        opacity: 0;
        transition: var(--transition);
      }

      .card:hover {
        transform: translateY(-4px);
        border-color: var(--border-light);
        box-shadow: var(--shadow-hover);
      }

      .card:hover::before {
        opacity: 1;
      }

      .card .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .card .card-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        background: rgba(108, 99, 255, 0.1);
        color: var(--accent-blue);
      }

      .card .card-label {
        font-size: 12px;
        color: var(--text-secondary);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .card .card-value {
        font-size: 28px;
        font-weight: 700;
        color: var(--text-primary);
        margin-top: 4px;
      }

      .card .card-change {
        font-size: 12px;
        margin-top: 8px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 12px;
        border-radius: 20px;
        font-weight: 600;
      }

      .card .card-change.positive {
        color: var(--accent-green);
        background: rgba(52, 211, 153, 0.12);
      }

      .card .card-change.negative {
        color: var(--accent-red);
        background: rgba(248, 113, 113, 0.12);
      }

      .card.accent-cyan .card-icon {
        background: rgba(34, 211, 238, 0.1);
        color: var(--accent-cyan);
      }
      .card.accent-green .card-icon {
        background: rgba(52, 211, 153, 0.1);
        color: var(--accent-green);
      }
      .card.accent-amber .card-icon {
        background: rgba(251, 191, 36, 0.1);
        color: var(--accent-amber);
      }

      /* ============================================
                   MÊS NAVIGATION
                   ============================================ */
      .month-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
        margin-bottom: 24px;
        padding: 16px 24px;
        background: var(--gradient-card);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        box-shadow: var(--shadow-card);
      }

      .month-nav .nav-group {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .month-nav button {
        background: none;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        color: var(--text-secondary);
        padding: 8px 16px;
        cursor: pointer;
        transition: var(--transition);
        font-size: 16px;
      }

      .month-nav button:hover {
        border-color: var(--accent-blue);
        color: var(--text-primary);
        background: rgba(108, 99, 255, 0.08);
      }

      .month-nav .month-label {
        font-size: 18px;
        font-weight: 600;
        color: var(--text-primary);
        min-width: 180px;
        text-align: center;
      }

      .copy-container {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .copy-container select {
        padding: 8px 14px;
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        color: var(--text-primary);
        font-size: 13px;
        outline: none;
        transition: var(--transition);
      }

      .copy-container select:focus {
        border-color: var(--accent-blue);
      }

      /* ============================================
                   FORMULÁRIOS
                   ============================================ */
      .form-card {
        background: var(--gradient-card);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        padding: 24px;
        margin-bottom: 24px;
        box-shadow: var(--shadow-card);
      }

      .form-card .form-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .form-group {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .form-group input,
      .form-group select {
        flex: 1;
        min-width: 140px;
        padding: 12px 16px;
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        color: var(--text-primary);
        font-size: 14px;
        transition: var(--transition);
        outline: none;
      }

      .form-group input:focus,
      .form-group select:focus {
        border-color: var(--accent-blue);
        box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
      }

      .form-group input::placeholder {
        color: var(--text-muted);
      }

      .form-group select option {
        background: var(--bg-secondary);
      }

      /* ============================================
                   BOTÕES
                   ============================================ */
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: var(--radius-sm);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .btn-primary {
        background: var(--gradient-primary);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(108, 99, 255, 0.3);
      }

      .btn-danger {
        background: var(--accent-red);
        color: white;
      }

      .btn-danger:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(248, 113, 113, 0.3);
      }

      .btn-outline {
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
      }

      .btn-outline:hover {
        border-color: var(--accent-blue);
        color: var(--text-primary);
        background: rgba(108, 99, 255, 0.08);
      }

      .btn-sm {
        padding: 6px 14px;
        font-size: 12px;
        border-radius: 8px;
      }

      .btn-copy {
        background: var(--accent-purple);
        color: white;
      }

      .btn-copy:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(168, 85, 247, 0.3);
      }

      .btn-edit {
        background: rgba(251, 191, 36, 0.15);
        color: var(--accent-amber);
        border: 1px solid rgba(251, 191, 36, 0.2);
      }

      .btn-edit:hover {
        background: rgba(251, 191, 36, 0.25);
        transform: translateY(-2px);
      }

      /* ============================================
                   TABELAS
                   ============================================ */
      .table-wrapper {
        background: var(--gradient-card);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow-card);
      }

      .table-toolbar {
        padding: 16px 20px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
        background: rgba(0, 0, 0, 0.2);
      }

      .table-toolbar input,
      .table-toolbar select {
        padding: 8px 14px;
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        color: var(--text-primary);
        font-size: 13px;
        outline: none;
        transition: var(--transition);
      }

      .table-toolbar input:focus,
      .table-toolbar select:focus {
        border-color: var(--accent-blue);
      }

      .table-toolbar input::placeholder {
        color: var(--text-muted);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead {
        background: rgba(0, 0, 0, 0.2);
      }

      th {
        text-align: left;
        padding: 14px 20px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        font-weight: 600;
        border-bottom: 1px solid var(--border-color);
      }

      td {
        padding: 14px 20px;
        font-size: 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        color: var(--text-primary);
        vertical-align: middle;
      }

      tr:hover td {
        background: rgba(255, 255, 255, 0.02);
      }

      .badge-status {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
      }

      .badge-status.pago {
        background: rgba(52, 211, 153, 0.15);
        color: var(--accent-green);
      }

      .badge-status.pendente {
        background: rgba(251, 191, 36, 0.15);
        color: var(--accent-amber);
      }

      /* ============================================
                   MODAL
                   ============================================ */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(12px);
        z-index: 2000;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.3s ease;
      }

      .modal-overlay.active {
        display: flex;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .modal {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        padding: 32px;
        max-width: 480px;
        width: 90%;
        box-shadow: var(--shadow-hover);
        animation: slideUp 0.3s ease;
      }

      @keyframes slideUp {
        from {
          transform: translateY(30px) scale(0.95);
          opacity: 0;
        }
        to {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }

      .modal h2 {
        margin-bottom: 24px;
        font-size: 22px;
        background: var(--gradient-primary);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .modal .form-group {
        margin-bottom: 16px;
      }

      .modal .form-group input,
      .modal .form-group select {
        width: 100%;
      }

      .modal-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 24px;
      }

      /* ============================================
                   TOAST
                   ============================================ */
      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 1000;
      }

      .toast {
        padding: 14px 24px;
        border-radius: var(--radius-sm);
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        font-size: 14px;
        box-shadow: var(--shadow-hover);
        animation: slideInRight 0.3s ease;
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 280px;
        backdrop-filter: blur(10px);
      }

      .toast.success {
        border-left: 4px solid var(--accent-green);
      }
      .toast.error {
        border-left: 4px solid var(--accent-red);
      }
      .toast.warning {
        border-left: 4px solid var(--accent-amber);
      }

      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(40px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* ============================================
                   RESPONSIVIDADE
                   ============================================ */
      @media (max-width: 992px) {
        .top-header {
          padding: 0 20px;
        }
        .top-header .header-left .date-display {
          display: none;
        }
        .top-header .header-right .nav-links a {
          font-size: 11px;
          padding: 4px 10px;
        }
        .profile-selector select {
          min-width: 60px;
          font-size: 12px;
        }
        .profile-selector .profile-salary {
          display: none;
        }
      }

      @media (max-width: 768px) {
        aside {
          width: 60px;
          padding: 16px 0;
        }

        .top-header {
          margin-left: 60px;
          padding: 0 16px;
          height: 60px;
        }

        .top-header .header-right .nav-links {
          display: none;
        }

        .profile-selector {
          padding: 2px 4px;
        }

        .profile-selector select {
          min-width: 50px;
          font-size: 11px;
          padding: 2px 4px;
        }

        .profile-selector .profile-avatar {
          width: 22px;
          height: 22px;
          font-size: 11px;
        }

        main {
          margin-left: 60px;

    <!-- ============================================
    JAVASCRIPT
    ============================================ -->
    <script>
      // ============================================
      // UTILITY FUNCTIONS
      // ============================================
      function formatBRL(value) {
        return new Intl.NumberFormat("pt-BR", {
          style: "currency",
          currency: "BRL",
        }).format(value);
      }

      function getMonthName(monthIndex) {
        const months = [
          "Janeiro",
          "Fevereiro",
          "Março",
          "Abril",
          "Maio",
          "Junho",
          "Julho",
          "Agosto",
          "Setembro",
          "Outubro",
          "Novembro",
          "Dezembro",
        ];
        return months[monthIndex];
      }

      function updateDateDisplay() {
        const now = new Date();
        const options = {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        };
        document.getElementById("current-date-display").textContent =
          now.toLocaleDateString("pt-BR", options);
      }

      // ============================================
      // DATA MANAGER
      // ============================================
      const DataManager = {
        get(key, defaultValue) {
          try {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : defaultValue;
          } catch {
            return defaultValue;
          }
        },
        set(key, data) {
          localStorage.setItem(key, JSON.stringify(data));
        },
        getExpenses(profile = "personal") {
          return this.get(`expenses_${profile}`, []);
        },
        setExpenses(profile, data) {
          this.set(`expenses_${profile}`, data);
        },
        getProfiles() {
          return this.get("profiles", {
            personal: {
              name: "Eu",
              salary: 6400,
              emoji: "👤",
              color: "personal",
            },
            aunt: { name: "Tia", salary: 4800, emoji: "👩", color: "aunt" },
          });
        },
        setProfiles(data) {
          this.set("profiles", data);
        },
        getActiveProfile() {
          return this.get("activeProfile", "personal");
        },
        setActiveProfile(profile) {
          this.set("activeProfile", profile);
        },
      };

      // ============================================
      // TOAST SYSTEM
      // ============================================
      function showToast(message, type = "success") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        const icons = { success: "✅", error: "❌", warning: "⚠️" };
        toast.innerHTML = `<span>${icons[type] || "📌"}</span> ${message}`;
        container.appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transform = "translateX(40px)";
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // ============================================
      // EXPENSES MODULE - COM MIGRAÇÃO AUTOMÁTICA
      // ============================================
      const Expenses = {
        data: [],
        currentMonth: new Date().getMonth(),
        currentYear: new Date().getFullYear(),
        editingId: null,
        activeProfile: "personal",
        profiles: {},

        init() {
          // ============================================
          // PASSO 1: MIGRAÇÃO AUTOMÁTICA DOS DADOS ANTIGOS
          // ============================================
          this.migrateOldData();

          this.profiles = DataManager.getProfiles();
          this.activeProfile = DataManager.getActiveProfile();
          this.data = DataManager.getExpenses(this.activeProfile);
          this.render();
          this.setupEvents();
          this.populateCopyMonths();
          this.updateProfileUI();
        },

        // ============================================
        // FUNÇÃO DE MIGRAÇÃO
        // ============================================
        migrateOldData() {
          try {
            // Verifica se existem dados antigos na chave 'expenses'
            const oldData = localStorage.getItem("expenses");
            const personalData = localStorage.getItem("expenses_personal");

            if (oldData) {
              const parsedOld = JSON.parse(oldData);

              // Se tem dados antigos E o perfil 'personal' está vazio
              if (parsedOld && parsedOld.length > 0) {
                // Verifica se 'expenses_personal' existe e tem dados
                let hasPersonalData = false;
                if (personalData) {
                  const parsedPersonal = JSON.parse(personalData);
                  if (parsedPersonal && parsedPersonal.length > 0) {
                    hasPersonalData = true;
                  }
                }

                if (!hasPersonalData) {
                  // Copia os dados antigos para 'expenses_personal'
                  localStorage.setItem("expenses_personal", oldData);
                  console.log(
                    `✅ Migrados ${parsedOld.length} gastos para o perfil "Eu"!`,
                  );

                  // Mostra um toast informativo
                  setTimeout(() => {
                    showToast(
                      `📦 ${parsedOld.length} gastos migrados para seu perfil!`,
                      "success",
                    );
                  }, 500);
                } else {
                  console.log(
                    `ℹ️ Perfil "Eu" já tem ${JSON.parse(personalData).length} gastos. Nada foi migrado.`,
                  );
                }
              }
            }

            // Verifica se precisa criar o perfil "Tia" vazio
            const auntData = localStorage.getItem("expenses_aunt");
            if (!auntData) {
              localStorage.setItem("expenses_aunt", "[]");
            }

            // Verifica se precisa criar o perfil "Convidado" vazio
            const guestData = localStorage.getItem("expenses_guest");
            if (!guestData) {
              localStorage.setItem("expenses_guest", "[]");
            }
          } catch (e) {
            console.error("❌ Erro na migração:", e);
          }
        },

        setupEvents() {
          document
            .getElementById("expense-form")
            .addEventListener("submit", (e) => {
              e.preventDefault();
              this.add();
            });

          document
            .getElementById("expense-search")
            .addEventListener("input", () => this.render());
          document
            .getElementById("expense-filter-category")
            .addEventListener("change", () => this.render());

          document
            .getElementById("prev-month")
            .addEventListener("click", () => {
              this.currentMonth--;
              if (this.currentMonth < 0) {
                this.currentMonth = 11;
                this.currentYear--;
              }
              this.render();
              this.populateCopyMonths();
            });

          document
            .getElementById("next-month")
            .addEventListener("click", () => {
              this.currentMonth++;
              if (this.currentMonth > 11) {
                this.currentMonth = 0;
                this.currentYear++;
              }
              this.render();
              this.populateCopyMonths();
            });

          document
            .getElementById("today-month")
            .addEventListener("click", () => {
              const today = new Date();
              this.currentMonth = today.getMonth();
              this.currentYear = today.getFullYear();
              this.render();
              this.populateCopyMonths();
            });

          document
            .getElementById("export-expenses")
            .addEventListener("click", () => this.exportCSV());
          document
            .getElementById("copy-expenses")
            .addEventListener("click", () => this.copyFromMonth());

          document
            .getElementById("cancel-edit")
            .addEventListener("click", () => this.closeModal());
          document
            .getElementById("edit-modal")
            .addEventListener("click", (e) => {
              if (e.target === e.currentTarget) this.closeModal();
            });
          document
            .getElementById("edit-form")
            .addEventListener("submit", (e) => {
              e.preventDefault();
              this.saveEdit();
            });

          // Perfil selector
          document
            .getElementById("profile-select")
            .addEventListener("change", (e) => {
              this.switchProfile(e.target.value);
            });

          // Click no avatar para abrir modal de gerenciar perfis
          document
            .getElementById("profile-avatar")
            .addEventListener("click", () => {
              // Por enquanto só mostra um toast
              showToast("👤 Clique no nome do perfil para alternar", "info");
            });
        },

        // ============================================
        // PERFIL
        // ============================================
        switchProfile(profileId) {
          // Salva os dados do perfil atual
          DataManager.setExpenses(this.activeProfile, this.data);

          this.activeProfile = profileId;
          DataManager.setActiveProfile(profileId);
          this.data = DataManager.getExpenses(profileId);

          this.updateProfileUI();
          this.render();
          this.populateCopyMonths();

          const profile = this.profiles[profileId];
          showToast(
            `👤 Mudou para perfil: ${profile ? profile.name : profileId}`,
            "success",
          );
        },

        updateProfileUI() {
          const profile = this.profiles[this.activeProfile];
          if (!profile) return;

          const select = document.getElementById("profile-select");
          select.value = this.activeProfile;

          const avatar = document.getElementById("profile-avatar");
          avatar.textContent = profile.emoji || "👤";
          avatar.className = `profile-avatar ${profile.color || "personal"}`;

          document.getElementById("profile-salary-display").textContent =
            formatBRL(profile.salary || 0);

          // Atualiza o card de salário
          document.getElementById("monthly-salary").textContent = formatBRL(
            profile.salary || 0,
          );
        },

        // ============================================
        // GASTOS
        // ============================================
        populateCopyMonths() {
          const select = document.getElementById("copy-from-month");
          const currentMonthStr = `${this.currentYear}-${String(this.currentMonth + 1).padStart(2, "0")}`;
          const months = new Set();

          this.data.forEach((exp) => {
            const month = exp.date.slice(0, 7);
            if (month !== currentMonthStr) months.add(month);
          });

          const sortedMonths = Array.from(months).sort();
          select.innerHTML = `<option value="">Selecione um mês</option>`;

          if (sortedMonths.length === 0) {
            select.innerHTML +=
              '<option value="" disabled>Nenhum mês com dados</option>';
            return;
          }

          sortedMonths.forEach((month) => {
            const [year, m] = month.split("-");
            const label = `${getMonthName(parseInt(m) - 1)} ${year}`;
            select.innerHTML += `<option value="${month}">${label}</option>`;
          });
        },

        copyFromMonth() {
          const select = document.getElementById("copy-from-month");
          const sourceMonth = select.value;

          if (!sourceMonth) {
            showToast("Selecione um mês para copiar!", "warning");
            return;
          }

          const targetMonth = `${this.currentYear}-${String(this.currentMonth + 1).padStart(2, "0")}`;

          const hasTargetData = this.data.some((e) =>
            e.date.startsWith(targetMonth),
          );

          if (hasTargetData) {
            if (
              !confirm(
                `O mês ${getMonthName(this.currentMonth)} ${this.currentYear} já tem gastos. Deseja substituir?`,
              )
            ) {
              return;
            }
            this.data = this.data.filter(
              (e) => !e.date.startsWith(targetMonth),
            );
          }

          const sourceExpenses = this.data.filter((e) =>
            e.date.startsWith(sourceMonth),
          );

          if (sourceExpenses.length === 0) {
            showToast("Nenhum gasto encontrado no mês selecionado!", "warning");
            return;
          }

          const newExpenses = sourceExpenses.map((exp) => ({
            id: Date.now() + Math.random() * 1000,
            name: exp.name,
            category: exp.category,
            value: exp.value,
            date: exp.date.replace(sourceMonth, targetMonth),
            paid: false,
          }));

          this.data.push(...newExpenses);
          DataManager.setExpenses(this.activeProfile, this.data);

          this.populateCopyMonths();
          this.render();

          showToast(`${newExpenses.length} gastos copiados!`, "success");
        },

        add() {
          const name = document.getElementById("expense-name").value.trim();
          const category = document.getElementById("expense-category").value;
          const value = parseFloat(
            document.getElementById("expense-value").value,
          );
          const date = document.getElementById("expense-date").value;

          if (!name || !category || !value || !date) {
            showToast("Preencha todos os campos!", "warning");
            return;
          }

          this.data.push({
            id: Date.now(),
            name,
            category,
            value,
            date,
            paid: false,
          });
          DataManager.setExpenses(this.activeProfile, this.data);
          this.populateCopyMonths();
          this.render();
          document.getElementById("expense-form").reset();
          showToast(`Gasto "${name}" adicionado!`);
        },

        togglePaid(id) {
          const expense = this.data.find((e) => e.id === id);
          if (expense) {
            expense.paid = !expense.paid;
            DataManager.setExpenses(this.activeProfile, this.data);
            this.render();
          }
        },

        delete(id) {
          if (!confirm("Excluir este gasto?")) return;
          this.data = this.data.filter((e) => e.id !== id);
          DataManager.setExpenses(this.activeProfile, this.data);
          this.populateCopyMonths();
          this.render();
          showToast("Gasto removido!", "warning");
        },

        openModal(id) {
          const expense = this.data.find((e) => e.id === id);
          if (!expense) return;

          this.editingId = id;
          document.getElementById("edit-name").value = expense.name;
          document.getElementById("edit-category").value = expense.category;
          document.getElementById("edit-value").value = expense.value;
          document.getElementById("edit-date").value = expense.date;

          document.getElementById("edit-modal").classList.add("active");
        },

        closeModal() {
          document.getElementById("edit-modal").classList.remove("active");
          this.editingId = null;
        },

        saveEdit() {
          const name = document.getElementById("edit-name").value.trim();
          const category = document.getElementById("edit-category").value;
          const value = parseFloat(document.getElementById("edit-value").value);
          const date = document.getElementById("edit-date").value;

          if (!name || !category || !value || !date) {
            showToast("Preencha todos os campos!", "warning");
            return;
          }

          const expense = this.data.find((e) => e.id === this.editingId);
          if (expense) {
            expense.name = name;
            expense.category = category;
            expense.value = value;
            expense.date = date;

            DataManager.setExpenses(this.activeProfile, this.data);
            this.closeModal();
            this.populateCopyMonths();
            this.render();
            showToast("Gasto atualizado!");
          }
        },

        render() {
          const monthStr = String(this.currentMonth + 1).padStart(2, "0");
          const yearStr = String(this.currentYear);
          const currentMonthStr = `${yearStr}-${monthStr}`;

          document.getElementById("current-month-label").textContent =
            `${getMonthName(this.currentMonth)} ${this.currentYear}`;

          const search = document
            .getElementById("expense-search")
            .value.toLowerCase();
          const categoryFilter = document.getElementById(
            "expense-filter-category",
          ).value;

          let monthExpenses = this.data.filter((e) =>
            e.date.startsWith(currentMonthStr),
          );

          let filtered = monthExpenses.filter((exp) => {
            const matchSearch = exp.name.toLowerCase().includes(search);
            const matchCategory =
              categoryFilter === "all" || exp.category === categoryFilter;
            return matchSearch && matchCategory;
          });

          const totalMonth = monthExpenses.reduce((sum, e) => sum + e.value, 0);
          const paidMonth = monthExpenses
            .filter((e) => e.paid)
            .reduce((sum, e) => sum + e.value, 0);
          const pendingMonth = totalMonth - paidMonth;

          const profile = this.profiles[this.activeProfile];
          const salary = profile ? profile.salary : 6400;
          const remaining = salary - totalMonth;

          document.getElementById("monthly-salary").textContent =
            formatBRL(salary);
          document.getElementById("expense-total-month").textContent =
            formatBRL(totalMonth);
          document.getElementById("expense-remaining").textContent =
            formatBRL(remaining);
          document.getElementById("expense-pending").textContent =
            formatBRL(pendingMonth);

          const remainingEl = document.getElementById("expense-remaining");
          remainingEl.style.color =
            remaining < 0 ? "var(--accent-red)" : "var(--accent-green)";

          const tbody = document.getElementById("expense-list");
          if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">Nenhum gasto encontrado para este mês</td></tr>`;
          } else {
            tbody.innerHTML = filtered
              .map(
                (exp) => `
              <tr>
                <td><strong>${exp.name}</strong></td>
                <td><span class="badge-status" style="background:rgba(168,85,247,0.12);color:var(--accent-purple);">${exp.category}</span></td>
                <td>${formatBRL(exp.value)}</td>
                <td>${new Date(exp.date).toLocaleDateString("pt-BR")}</td>
                <td>
                  <span class="badge-status ${exp.paid ? "pago" : "pendente"}" 
                        style="cursor:pointer;" onclick="Expenses.togglePaid(${exp.id})">
                    ${exp.paid ? "✅ Pago" : "⏳ Pendente"}
                  </span>
                </td>
                <td>
                  <button class="btn btn-edit btn-sm" onclick="Expenses.openModal(${exp.id})" title="Editar">✏️</button>
                  <button class="btn btn-danger btn-sm" onclick="Expenses.delete(${exp.id})" title="Excluir">🗑️</button>
                </td>
              </tr>
            `,
              )
              .join("");
          }
        },

        exportCSV() {
          const monthStr = String(this.currentMonth + 1).padStart(2, "0");
          const yearStr = String(this.currentYear);
          const currentMonthStr = `${yearStr}-${monthStr}`;
          const monthExpenses = this.data.filter((e) =>
            e.date.startsWith(currentMonthStr),
          );

          if (monthExpenses.length === 0) {
            showToast("Nenhum dado para exportar", "warning");
            return;
          }

          const headers = ["Descrição", "Categoria", "Valor", "Data", "Status"];
          const rows = monthExpenses.map((exp) => [
            exp.name,
            exp.category,
            exp.value,
            exp.date,
            exp.paid ? "Pago" : "Pendente",
          ]);
          const csv = [headers.join(","), ...rows.map((r) => r.join(","))].join(
            "\n",
          );
          const blob = new Blob([csv], { type: "text/csv" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `gastos_${this.activeProfile}_${currentMonthStr}.csv`;
          a.click();
          URL.revokeObjectURL(url);
          showToast("CSV exportado!");
        },
      };

      // ============================================
      // THEME TOGGLE
      // ============================================
      let darkTheme = true;
      document
        .getElementById("themeToggle")
        .addEventListener("click", function () {
          darkTheme = !darkTheme;
          const root = document.documentElement;
          if (darkTheme) {
            root.style.setProperty("--bg-primary", "#0f0f1a");
            root.style.setProperty("--bg-secondary", "#1a1a2e");
            root.style.setProperty("--bg-card", "rgba(26,26,46,0.8)");
            root.style.setProperty("--bg-input", "#16162b");
            root.style.setProperty("--text-primary", "#ffffff");
            root.style.setProperty("--text-secondary", "rgba(255,255,255,0.7)");
            root.style.setProperty("--text-muted", "rgba(255,255,255,0.4)");
            root.style.setProperty("--border-color", "rgba(255,255,255,0.06)");
            this.textContent = "🌓";
          } else {
            root.style.setProperty("--bg-primary", "#f0f2f8");
            root.style.setProperty("--bg-secondary", "#ffffff");
            root.style.setProperty("--bg-card", "rgba(255,255,255,0.9)");
            root.style.setProperty("--bg-input", "#f0f2f8");
            root.style.setProperty("--text-primary", "#1a1a2e");
            root.style.setProperty("--text-secondary", "rgba(0,0,0,0.7)");
            root.style.setProperty("--text-muted", "rgba(0,0,0,0.4)");
            root.style.setProperty("--border-color", "rgba(0,0,0,0.06)");
            this.textContent = "🌞";
          }
        });

      // ============================================
      // INIT
      // ============================================
      updateDateDisplay();
      Expenses.init();

      console.log("💳 FinControl - Gastos carregado!");
      console.log("👤 Sistema de múltiplos perfis ativado!");
      console.log("📊 Perfis disponíveis:", Object.keys(Expenses.profiles));

      // Verifica se os dados foram migrados
      setTimeout(() => {
        const personal = localStorage.getItem("expenses_personal");
        if (personal) {
          const parsed = JSON.parse(personal);
          console.log(`📦 Perfil "Eu" tem ${parsed.length} gastos`);
        }
      }, 1000);
    </script>
  </body>
</html>
